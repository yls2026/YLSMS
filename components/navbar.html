<!-- Login Modal (shared across every page) -->
<div class="modal fade" id="adminLoginModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-shield-lock-fill me-2"></i>Committee Login</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <form id="adminLoginForm">
        <div class="modal-body">
          <div id="adminLoginAlert"></div>
          <p class="text-muted small">Everyone can view members, attendance, fees and birthdays. Logging in lets you add, edit and mark records — and is recorded in the Activity Log.</p>
          <div id="adminLoginDemoHint" class="alert alert-warning small d-none">
            Demo mode — every account's password is <strong>changeme123</strong>.
          </div>
          <div class="mb-3">
            <label class="form-label" for="adminLoginUser">Who are you?</label>
            <select class="form-select" id="adminLoginUser" required>
              <option value="">Loading…</option>
            </select>
          </div>
          <div>
            <label class="form-label" for="adminLoginPassword">Password</label>
            <input type="password" class="form-control" id="adminLoginPassword" required autocomplete="current-password" placeholder="••••••••">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-primary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary" id="adminLoginSubmit"><i class="bi bi-box-arrow-in-right me-1"></i>Log In</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  (function () {
    const dateEl = document.getElementById('navCurrentDate');
    if (dateEl) {
      dateEl.textContent = new Date().toLocaleDateString('en-GB', { weekday: 'short', day: '2-digit', month: 'short', year: 'numeric' });
    }
  })();
</script>
